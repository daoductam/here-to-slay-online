version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      - PORT=4000
      - CLIENT_URL=https://daoductam.dpdns.org
    networks:
      - game-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: always
    networks:
      - game-network

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client
    networks:
      - game-network

volumes:
  caddy_data:
  caddy_config:

networks:
  game-network:
    driver: bridge
